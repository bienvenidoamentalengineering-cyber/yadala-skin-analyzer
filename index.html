let step='prefilter',qIndex=0,answers={},scores={PREVENT:0,RECOVER:0,RECLAIM:0};
let selectedVal=null,currentLinea=null,leadHot=false,leadFrustrada=false;

function render(){
  if(step==='prefilter')renderPrefilter();
  else if(step==='quiz')renderQuestion();
  else if(step==='lead')renderLead();
}

function renderPrefilter(){
  document.getElementById('progWrap').style.display='none';
  document.getElementById('main').innerHTML=`
    <div class="card card-enter">
      <div class="pf-eyebrow">YADALASKIN · Diagnóstico personalizado</div>

      <button class="btn-main" id="btnPF" onclick="startQuiz()" style="opacity:0;pointer-events:none">Sí, esto soy yo →</button>

function togglePF(el){
  el.classList.toggle('selected');
  const any=document.querySelectorAll('.pf-opt.selected').length>0;
  const b=document.getElementById('btnPF');
  b.style.opacity=any?'1':'0';
  b.style.pointerEvents=any?'all':'none';
}

function startQuiz(){step='quiz';qIndex=0;document.getElementById('progWrap').style.display='block';render()}

function renderQuestion(){
  const q=questions[qIndex];
  document.getElementById('progFill').style.width=((qIndex/questions.length)*100)+'%';
  document.getElementById('progText').textContent=`Pregunta ${qIndex+1} de ${questions.length}`;
  selectedVal=null;
  document.getElementById('main').innerHTML=`
    <div class="card card-enter">
      <div class="q-label">${q.label}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o,i)=>`<button class="option" onclick="selectOpt(${i})"><div class="opt-marker"></div><div class="opt-text">${o.text}</div></button>`).join('')}
      </div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">Continuar →</button>`;
}

function selectOpt(i){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  document.querySelectorAll('.option')[i].classList.add('selected');
  const q=questions[qIndex];
  const opt=q.options[i];
  selectedVal=opt.value;
  answers[q.id]=opt.value;
  Object.keys(opt.scores).forEach(k=>scores[k]+=opt.scores[k]);
  if(opt.flag==='hot')leadHot=true;
  if(opt.flag==='frustrada')leadFrustrada=true;
  document.getElementById('btnNext').classList.add('show');
}

function nextQ(){
  if(!selectedVal)return;
  qIndex++;
  if(qIndex<questions.length){renderQuestion();window.scrollTo(0,0);}
  else{step='lead';renderLead();window.scrollTo(0,0);}
}

async function sendEmail(email,linea){
  try{
    await fetch(`${PROXY}/send-email`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:'onboarding@resend.dev',to:email,subject:EMAIL_SUBJECTS[linea]||EMAIL_SUBJECTS.RECOVER,html:EMAIL_BODIES[linea]||EMAIL_BODIES.RECOVER})});
    console.log('Email enviado a',email);
  }catch(e){console.log('Email error:',e)}
}

async function submitLead(){
  const email=document.getElementById('emailInput').value;
  if(!email||!email.includes('@')){document.getElementById('emailInput').style.borderColor='#c0392b';return}
  const btn=document.getElementById('btnLead');
  btn.textContent='Analizando...';btn.disabled=true;
  currentLinea=calcLinea();
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/quiz_leads`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'},body:JSON.stringify({email,linea:currentLinea})});
    await fetch(`${SUPABASE_URL}/rest/v1/skin_analyses`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'},body:JSON.stringify({email,...answers,linea:currentLinea,fuente:'web-quiz-v2'})});
    await sendEmail(email,currentLinea);
  }catch(e){console.log('Supabase:',e)}
  document.getElementById('main').style.display='none';
  document.getElementById('progWrap').style.display='none';
  document.getElementById('analyzing').classList.add('on');
  window.scrollTo(0,0);
  await getAIResult();
}

function calcLinea(){
  let s={...scores};
  if(leadFrustrada){s.RECOVER+=2;s.RECLAIM+=2;s.PREVENT-=1}
  if(leadHot&&s.RECLAIM>=s.RECOVER)s.RECLAIM+=1;
  const max=Math.max(s.PREVENT,s.RECOVER,s.RECLAIM);
  if(s.PREVENT===max)return'PREVENT';
  if(s.RECOVER===max)return'RECOVER';
  return'RECLAIM';
}

function restartQuiz(){
