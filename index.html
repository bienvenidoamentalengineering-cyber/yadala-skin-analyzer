<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YADALASKIN Analyzer — Descubre tu piel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --sand: #E8DDD0;
    --earth: #C4A882;
    --bark: #8B6F47;
    --deep: #2C1F0E;
    --prevent: #2A7A6B;
    --recover: #B87333;
    --reclaim: #7D3F5A;
    --white: #FDFAF7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo con textura sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(196,168,130,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,111,71,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--bark);
    margin-bottom: 0.3rem;
  }

  .logo span {
    color: var(--earth);
    font-style: italic;
  }

  .tagline {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    opacity: 0.8;
  }

  /* PROGRESS */
  .progress-wrap {
    margin: 2rem 0 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .progress-bar {
    height: 1px;
    background: var(--sand);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--earth), var(--bark));
    border-radius: 1px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-text {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    text-align: right;
  }

  /* TARJETA DE PREGUNTA */
  .question-card {
    background: var(--white);
    border: 1px solid rgba(196,168,130,0.3);
    border-radius: 2px;
    padding: 2.5rem 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 40px rgba(44,31,14,0.06);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
  }

  .q-number {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 1rem;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    font-weight: 400;
    line-height: 1.4;
    color: var(--deep);
    margin-bottom: 2rem;
  }

  /* OPCIONES */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--sand);
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    text-align: left;
    width: 100%;
  }

  .option:hover {
    border-color: var(--earth);
    background: rgba(196,168,130,0.06);
  }

  .option.selected {
    border-color: var(--bark);
    background: rgba(139,111,71,0.08);
  }

  .opt-marker {
    width: 18px;
    height: 18px;
    border: 1px solid var(--earth);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .option.selected .opt-marker {
    background: var(--bark);
    border-color: var(--bark);
  }

  .option.selected .opt-marker::after {
    content: '';
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
  }

  .opt-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--deep);
  }

  .opt-sub {
    font-size: 0.75rem;
    color: var(--bark);
    opacity: 0.7;
    margin-top: 2px;
    font-style: italic;
  }

  /* BOTÓN SIGUIENTE */
  .btn-next {
    width: 100%;
    padding: 1rem 2rem;
    background: var(--deep);
    color: var(--cream);
    border: none;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
    margin-top: 0.5rem;
  }

  .btn-next.visible {
    opacity: 1;
    pointer-events: all;
    animation: fadeUp 0.4s ease forwards;
  }

  .btn-next:hover {
    background: var(--bark);
  }

  /* PANTALLA DE ANÁLISIS */
  .analyzing {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .analyzing.active { display: block; }

  .pulse-ring {
    width: 80px;
    height: 80px;
    border: 1px solid var(--earth);
    border-radius: 50%;
    margin: 0 auto 2rem;
    position: relative;
    animation: pulse 2s ease infinite;
  }

  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid var(--bark);
    border-radius: 50%;
    animation: pulse 2s ease 0.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.6; }
  }

  .analyzing-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--bark);
    margin-bottom: 0.5rem;
  }

  .analyzing-sub {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--earth);
    opacity: 0.7;
  }

  /* RESULTADO */
  .result {
    display: none;
    opacity: 0;
  }

  .result.active {
    display: block;
    animation: fadeUp 0.8s ease forwards;
  }

  .result-header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  .result-line-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    margin-bottom: 1.2rem;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .result-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    font-weight: 300;
    opacity: 0.7;
  }

  .result-card {
    background: var(--white);
    border: 1px solid rgba(196,168,130,0.3);
    border-radius: 2px;
    padding: 2rem;
    margin: 1.5rem 0;
    box-shadow: 0 4px 40px rgba(44,31,14,0.06);
  }

  .result-section-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 0.8rem;
  }

  .result-text {
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--deep);
    margin-bottom: 1.5rem;
  }

  .result-text:last-child { margin-bottom: 0; }

  .benefit-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .benefit-list li {
    font-size: 0.88rem;
    color: var(--deep);
    padding-left: 1.2rem;
    position: relative;
    line-height: 1.5;
  }

  .benefit-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--earth);
  }

  .divider {
    height: 1px;
    background: var(--sand);
    margin: 1.5rem 0;
  }

  /* CTA */
  .cta-section {
    text-align: center;
    padding: 1rem 0 2rem;
  }

  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

  .cta-sub {
    font-size: 0.82rem;
    color: var(--bark);
    opacity: 0.8;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .email-wrap {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .email-input {
    flex: 1;
    padding: 0.9rem 1rem;
    border: 1px solid var(--sand);
    border-radius: 1px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--deep);
    outline: none;
    transition: border-color 0.2s;
  }

  .email-input:focus { border-color: var(--earth); }

  .btn-cta {
    padding: 0.9rem 1.5rem;
    background: var(--bark);
    color: var(--cream);
    border: none;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-cta:hover { background: var(--deep); }

  .privacy-note {
    font-size: 0.7rem;
    color: var(--earth);
    opacity: 0.6;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--sand);
    padding: 0.7rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bark);
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .btn-restart:hover { border-color: var(--bark); }

  /* FIRMA */
  .footer-sig {
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid var(--sand);
    margin-top: 2rem;
  }

  .sig-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--earth);
    opacity: 0.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* COLORES POR LÍNEA */
  .prevent { --line-color: var(--prevent); }
  .recover { --line-color: var(--recover); }
  .reclaim { --line-color: var(--reclaim); }

  .line-badge-prevent { background: rgba(42,122,107,0.1); color: var(--prevent); }
  .line-badge-recover { background: rgba(184,115,51,0.12); color: var(--recover); }
  .line-badge-reclaim { background: rgba(125,63,90,0.1); color: var(--reclaim); }

  .accent-prevent { color: var(--prevent); }
  .accent-recover { color: var(--recover); }
  .accent-reclaim { color: var(--reclaim); }

  /* Loading dots */
  .dots span {
    display: inline-block;
    animation: blink 1.4s ease infinite;
    opacity: 0;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  @media (max-width: 480px) {
    .email-wrap { flex-direction: column; }
    .question-card { padding: 1.75rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">YADALA<span>skin</span></div>
    <div class="tagline">Analizador · Descubre lo que tu piel necesita</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Pregunta 1 de 5</div>
  </div>

  <!-- QUIZ -->
  <div id="quizSection">
    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">Pregunta 1 — Tu momento</div>
      <div class="q-text" id="qText">¿En qué etapa de vida sientes que está tu piel ahora mismo?</div>
      <div class="options" id="optionsContainer"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Continuar →</button>
  </div>

  <!-- ANALIZANDO -->
  <div class="analyzing" id="analyzingSection">
    <div class="pulse-ring"></div>
    <div class="analyzing-text">Analizando tu piel<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="analyzing-sub">Creando tu protocolo personalizado</div>
  </div>

  <!-- RESULTADO -->
  <div class="result" id="resultSection"></div>

</div>

<script>
const questions = [
  {
    id: 'estado',
    number: 'Un momento — Tu piel hoy',
    text: '¿Cómo describes tu relación con tu piel ahora mismo?',
    options: [
      { text: 'Está bien... pero siento que podría estar más viva', sub: 'Quiero activarla antes de que me pida algo', value: 'prevent' },
      { text: 'Algo ha cambiado y ya no me reconozco del todo', sub: 'No es drama, pero algo no encaja como antes', value: 'recover' },
      { text: 'He dejado de buscar volver atrás. Quiero verme viva hoy', sub: 'No quiero corregir. Quiero habitar mi piel como es', value: 'reclaim' }
    ]
  },
  {
    id: 'preocupacion',
    number: 'Escúchala — Lo que tu piel pide',
    text: '¿Qué es lo que más reconoces en tu piel ahora mismo?',
    options: [
      { text: 'Las líneas de la sonrisa ya no desaparecen cuando dejo de sonreír', sub: 'Con luz lateral se me ven unos surcos que antes no estaban', value: 'nasogeniano' },
      { text: 'Parezco triste aunque esté bien. Mi boca tira hacia abajo', sub: 'Las comisuras han bajado y mi cara en reposo ya no es la mía', value: 'comisuras' },
      { text: 'El óvalo ya no está donde era, todo parece que cae', sub: 'La mandíbula que era mía ya no se define igual', value: 'ovalo' },
      { text: 'Los puntos negros de la nariz siempre están ahí', sub: 'He probado de todo y a los dos días vuelven', value: 'poros' },
      { text: 'Cuidarla antes de que me pida algo', sub: 'Prevención consciente, no reacción tardía', value: 'prevencion' }
    ]
  },
  {
    id: 'estilo',
    number: 'Pregunta 3 — Tu ritmo de vida',
    text: '¿Cómo describirías tu relación con el estrés y el descanso?',
    options: [
      { text: 'Alto estrés, poco tiempo para mí', sub: 'Pantallas, ritmo urbano, dormir poco', value: 'estres' },
      { text: 'Equilibrado, cuido mis rutinas', sub: 'Me preocupo por el bienestar aunque sea ocupada', value: 'equilibrio' },
      { text: 'Activa pero sin descanso suficiente', sub: 'Energía alta, pero mi piel lo nota', value: 'activa' },
      { text: 'Tranquilo, priorizo el bienestar', sub: 'Busco lo natural y consciente en todo', value: 'tranquilo' }
    ]
  },
  {
    id: 'cosmetica',
    number: 'Pregunta 4 — Tu relación con los tratamientos',
    text: '¿Cuál es tu posición frente a los tratamientos estéticos?',
    options: [
      { text: 'Solo soluciones naturales, siempre', sub: 'Sin agujas, sin intervenciones, sin artificios', value: 'natural' },
      { text: 'He probado algo pero busco alternativa más natural', sub: 'Quiero resultados sin depender de clínicas', value: 'alternativa' },
      { text: 'No me importa el método, quiero resultados reales', sub: 'Lo que funcione, funcione', value: 'resultados' },
      { text: 'Nunca he hecho nada especial', sub: 'Este sería mi primer paso consciente', value: 'primero' }
    ]
  },
  {
    id: 'objetivo',
    number: 'Pregunta 5 — Lo que deseas',
    text: 'Si tu piel pudiera darte algo mañana por la mañana, ¿qué sería?',
    options: [
      { text: 'Verme fresca, luminosa y natural sin maquillaje', sub: 'Piel viva que habla por sí sola', value: 'luminosa' },
      { text: 'Recuperar la energía y firmeza que tenía', sub: 'Mi piel, pero en su mejor versión', value: 'energia' },
      { text: 'Sentir que tengo estructura y presencia de nuevo', sub: 'Rostro definido, sin intervenciones', value: 'estructura' },
      { text: 'Simplemente sentir que me cuido de verdad', sub: 'Un ritual que conecte cuerpo y alma', value: 'ritual' }
    ]
  }
];

let current = 0;
let answers = {};
let selectedOption = null;
let currentLinea = null;

function renderQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Pregunta ${current + 1} de ${questions.length}`;
  document.getElementById('qNumber').textContent = q.number;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  selectedOption = null;
  document.getElementById('btnNext').classList.remove('visible');

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `
      <div class="opt-marker"></div>
      <div>
        <div class="opt-text">${opt.text}</div>
        ${opt.sub ? `<div class="opt-sub">${opt.sub}</div>` : ''}
      </div>`;
    btn.onclick = () => selectOption(i, opt.value, q.id);
    container.appendChild(btn);
  });

  // Animación de entrada
  const card = document.getElementById('questionCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';
  setTimeout(() => {
    card.style.transition = 'all 0.4s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  }, 50);
}

function selectOption(index, value, questionId) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option')[index].classList.add('selected');
  selectedOption = value;
  answers[questionId] = value;
  document.getElementById('btnNext').classList.add('visible');
}

function nextQuestion() {
  if (!selectedOption) return;
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showAnalyzing();
  }
}

function showAnalyzing() {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const analyzing = document.getElementById('analyzingSection');
  analyzing.classList.add('active');
  analyzing.style.opacity = '0';
  setTimeout(() => {
    analyzing.style.transition = 'opacity 0.6s ease';
    analyzing.style.opacity = '1';
  }, 50);
  getRecommendation();
}

function determineLineLocally(answers) {
  // Lógica local como fallback
  let score = { PREVENT: 0, RECOVER: 0, RECLAIM: 0 };

  if (answers.estado === 'prevent') score.PREVENT += 3;
  if (answers.estado === 'recover') score.RECOVER += 3;
  if (answers.estado === 'reclaim') score.RECLAIM += 3;

  if (answers.preocupacion === 'prevencion' || answers.preocupacion === 'poros') score.PREVENT += 2;
  if (answers.preocupacion === 'nasogeniano' || answers.preocupacion === 'comisuras') score.RECOVER += 2;
  if (answers.preocupacion === 'ovalo') score.RECLAIM += 2;

  if (answers.objetivo === 'luminosa' || answers.objetivo === 'ritual') score.PREVENT += 1;
  if (answers.objetivo === 'energia') score.RECOVER += 1;
  if (answers.objetivo === 'estructura') score.RECLAIM += 1;

  return Object.entries(score).sort((a,b) => b[1]-a[1])[0][0];
}

async function getRecommendation() {
  const linea = determineLineLocally(answers);

  const prompt = `Eres el YADALASKIN Analyzer de YADALA, una cosmética ancestral española fundada por Pedro Jordà (Lanzarote).

YADALA es una mascarilla facial de 4 generaciones que actúa mediante bioestimulación natural: activa fibroblastos, tonifica músculos faciales y oxigena tejidos profundos. Sin agujas, sin cirugía, sin paralización.

Las 3 líneas:
- PREVENT (20–30): piel joven, prevención, luminosidad, glow natural
- RECOVER (30–45): recuperar firmeza, contorno, energía facial
- RECLAIM (45+): lifting natural, estructura, expresión preservada

Respuestas del usuario:
- Edad: ${answers.estado}
- Zona de preocupación principal: ${answers.preocupacion === 'nasogeniano' ? 'surcos nasogenianos / pliegues de la sonrisa' : answers.preocupacion === 'comisuras' ? 'comisuras caídas / cara triste en reposo' : answers.preocupacion === 'ovalo' ? 'óvalo perdido / mandíbula desdibujada' : answers.preocupacion === 'poros' ? 'poros y puntos negros / exceso de sebo' : 'prevención consciente'}
- Estilo de vida: ${answers.estilo}
- Relación con cosmética: ${answers.cosmetica}
- Objetivo emocional: ${answers.objetivo}

Línea recomendada: ${linea}

Genera una respuesta en JSON con exactamente esta estructura (sin markdown, solo JSON puro):
{
  "linea": "${linea}",
  "frase_apertura": "frase personal y empática de 1-2 líneas que valide cómo se siente (empieza con 'Tu piel...' o similar)",
  "diagnostico": "2-3 frases explicando qué está pasando en su piel según sus respuestas, tono cálido y experto",
  "por_que_tu_linea": "2 frases explicando por qué ${linea} es perfecta para ella, mencionando su caso específico",
