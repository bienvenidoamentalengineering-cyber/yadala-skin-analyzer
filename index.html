<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YADALASKIN Analyzer — Descubre tu piel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F7F3EE;
    --sand: #E8DDD0;
    --earth: #C4A882;
    --bark: #8B6F47;
    --deep: #2C1F0E;
    --prevent: #2A7A6B;
    --recover: #B87333;
    --reclaim: #7D3F5A;
    --white: #FDFAF7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Fondo con textura sutil */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(196,168,130,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,111,71,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 3rem 0 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--bark);
    margin-bottom: 0.3rem;
  }

  .logo span {
    color: var(--earth);
    font-style: italic;
  }

  .tagline {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    opacity: 0.8;
  }

  /* PROGRESS */
  .progress-wrap {
    margin: 2rem 0 2.5rem;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.2s forwards;
  }

  .progress-bar {
    height: 1px;
    background: var(--sand);
    border-radius: 1px;
    overflow: hidden;
    margin-bottom: 0.6rem;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--earth), var(--bark));
    border-radius: 1px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  .progress-text {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--earth);
    text-align: right;
  }

  /* TARJETA DE PREGUNTA */
  .question-card {
    background: var(--white);
    border: 1px solid rgba(196,168,130,0.3);
    border-radius: 2px;
    padding: 2.5rem 2rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 4px 40px rgba(44,31,14,0.06);
    opacity: 0;
    animation: fadeUp 0.6s ease 0.3s forwards;
  }

  .q-number {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 1rem;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    font-weight: 400;
    line-height: 1.4;
    color: var(--deep);
    margin-bottom: 2rem;
  }

  /* OPCIONES */
  .options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.2rem;
    border: 1px solid var(--sand);
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
    background: transparent;
    text-align: left;
    width: 100%;
  }

  .option:hover {
    border-color: var(--earth);
    background: rgba(196,168,130,0.06);
  }

  .option.selected {
    border-color: var(--bark);
    background: rgba(139,111,71,0.08);
  }

  .opt-marker {
    width: 18px;
    height: 18px;
    border: 1px solid var(--earth);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .option.selected .opt-marker {
    background: var(--bark);
    border-color: var(--bark);
  }

  .option.selected .opt-marker::after {
    content: '';
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
  }

  .opt-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--deep);
  }

  .opt-sub {
    font-size: 0.75rem;
    color: var(--bark);
    opacity: 0.7;
    margin-top: 2px;
    font-style: italic;
  }

  /* BOTÓN SIGUIENTE */
  .btn-next {
    width: 100%;
    padding: 1rem 2rem;
    background: var(--deep);
    color: var(--cream);
    border: none;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    pointer-events: none;
    margin-top: 0.5rem;
  }

  .btn-next.visible {
    opacity: 1;
    pointer-events: all;
    animation: fadeUp 0.4s ease forwards;
  }

  .btn-next:hover {
    background: var(--bark);
  }

  /* PANTALLA DE ANÁLISIS */
  .analyzing {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .analyzing.active { display: block; }

  .pulse-ring {
    width: 80px;
    height: 80px;
    border: 1px solid var(--earth);
    border-radius: 50%;
    margin: 0 auto 2rem;
    position: relative;
    animation: pulse 2s ease infinite;
  }

  .pulse-ring::after {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid var(--bark);
    border-radius: 50%;
    animation: pulse 2s ease 0.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.6; }
  }

  .analyzing-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--bark);
    margin-bottom: 0.5rem;
  }

  .analyzing-sub {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--earth);
    opacity: 0.7;
  }

  /* RESULTADO */
  .result {
    display: none;
    opacity: 0;
  }

  .result.active {
    display: block;
    animation: fadeUp 0.8s ease forwards;
  }

  .result-header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  .result-line-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 0.4rem 1.2rem;
    border-radius: 20px;
    margin-bottom: 1.2rem;
  }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    font-weight: 300;
    line-height: 1.2;
    margin-bottom: 0.5rem;
  }

  .result-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    font-weight: 300;
    opacity: 0.7;
  }

  .result-card {
    background: var(--white);
    border: 1px solid rgba(196,168,130,0.3);
    border-radius: 2px;
    padding: 2rem;
    margin: 1.5rem 0;
    box-shadow: 0 4px 40px rgba(44,31,14,0.06);
  }

  .result-section-title {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 0.8rem;
  }

  .result-text {
    font-size: 0.92rem;
    line-height: 1.8;
    color: var(--deep);
    margin-bottom: 1.5rem;
  }

  .result-text:last-child { margin-bottom: 0; }

  .benefit-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .benefit-list li {
    font-size: 0.88rem;
    color: var(--deep);
    padding-left: 1.2rem;
    position: relative;
    line-height: 1.5;
  }

  .benefit-list li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--earth);
  }

  .divider {
    height: 1px;
    background: var(--sand);
    margin: 1.5rem 0;
  }

  /* CTA */
  .cta-section {
    text-align: center;
    padding: 1rem 0 2rem;
  }

  .cta-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    margin-bottom: 0.5rem;
  }

  .cta-sub {
    font-size: 0.82rem;
    color: var(--bark);
    opacity: 0.8;
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .email-wrap {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }

  .email-input {
    flex: 1;
    padding: 0.9rem 1rem;
    border: 1px solid var(--sand);
    border-radius: 1px;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--deep);
    outline: none;
    transition: border-color 0.2s;
  }

  .email-input:focus { border-color: var(--earth); }

  .btn-cta {
    padding: 0.9rem 1.5rem;
    background: var(--bark);
    color: var(--cream);
    border: none;
    border-radius: 1px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-cta:hover { background: var(--deep); }

  .privacy-note {
    font-size: 0.7rem;
    color: var(--earth);
    opacity: 0.6;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--sand);
    padding: 0.7rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--bark);
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .btn-restart:hover { border-color: var(--bark); }

  /* FIRMA */
  .footer-sig {
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid var(--sand);
    margin-top: 2rem;
  }

  .sig-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--earth);
    opacity: 0.7;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* COLORES POR LÍNEA */
  .prevent { --line-color: var(--prevent); }
  .recover { --line-color: var(--recover); }
  .reclaim { --line-color: var(--reclaim); }

  .line-badge-prevent { background: rgba(42,122,107,0.1); color: var(--prevent); }
  .line-badge-recover { background: rgba(184,115,51,0.12); color: var(--recover); }
  .line-badge-reclaim { background: rgba(125,63,90,0.1); color: var(--reclaim); }

  .accent-prevent { color: var(--prevent); }
  .accent-recover { color: var(--recover); }
  .accent-reclaim { color: var(--reclaim); }

  /* Loading dots */
  .dots span {
    display: inline-block;
    animation: blink 1.4s ease infinite;
    opacity: 0;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

  @media (max-width: 480px) {
    .email-wrap { flex-direction: column; }
    .question-card { padding: 1.75rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">YADALA<span>skin</span></div>
    <div class="tagline">Analizador · Descubre lo que tu piel necesita</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Pregunta 1 de 5</div>
  </div>

  <!-- QUIZ -->
  <div id="quizSection">
    <div class="question-card" id="questionCard">
      <div class="q-number" id="qNumber">Pregunta 1 — Tu momento</div>
      <div class="q-text" id="qText">¿En qué etapa de vida sientes que está tu piel ahora mismo?</div>
      <div class="options" id="optionsContainer"></div>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Continuar →</button>
  </div>

  <!-- ANALIZANDO -->
  <div class="analyzing" id="analyzingSection">
    <div class="pulse-ring"></div>
    <div class="analyzing-text">Escuchando lo que tu piel dice<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="analyzing-sub">Preparando tu ritual personalizado</div>
  </div>

  <!-- RESULTADO -->
  <div class="result" id="resultSection"></div>

</div>

<script>
const questions = [
  {
    id: 'edad',
    number: 'Un momento — Tu piel',
    text: '¿Cómo sientes tu piel cuando te miras al espejo por la mañana?',
    options: [
      { text: 'Fresca y viva, pero quiero mantenerla así', sub: 'Me cuido hoy para no tener que corregir mañana', value: '20-30' },
      { text: 'Noto que algo ha cambiado y quiero recuperarlo', sub: 'No es urgencia, es querer volver a reconocerme', value: '30-45' },
      { text: 'Mi piel tiene historia y quiero que tenga fuerza', sub: 'Presencia real, sin perder mi expresión', value: '45+' }
    ]
  },
  {
    id: 'preocupacion',
    number: 'Escúchala — Lo que tu piel pide',
    text: '¿Qué es lo que tu piel te está pidiendo ahora mismo?',
    options: [
      { text: 'Más luz. Más vida. Menos grisura', sub: 'Piel apagada que ya no refleja cómo me siento', value: 'luminosidad' },
      { text: 'Volver a sentirla firme y definida', sub: 'El contorno que era mío y está dejando de serlo', value: 'firmeza' },
      { text: 'Estructura. Presencia. Que vuelva a sujetarse', sub: 'Pérdida de densidad que ya no puedo ignorar', value: 'flacidez' },
      { text: 'Cuidarla antes de que me pida algo', sub: 'Prevención consciente, no reacción tardía', value: 'prevencion' }
    ]
  },
  {
    id: 'estilo',
    number: 'Tu ritmo — Cómo vive tu cuerpo',
    text: '¿Cómo vive tu cuerpo el ritmo que llevas?',
    options: [
      { text: 'Con estrés constante. Mi piel lo siente', sub: 'Pantallas, poco sueño, ritmo que no para', value: 'estres' },
      { text: 'Con equilibrio. Me cuido aunque sea difícil', sub: 'Bienestar como prioridad, no como lujo', value: 'equilibrio' },
      { text: 'Con energía alta pero sin descanso suficiente', sub: 'Activa por fuera, agotada por dentro', value: 'activa' },
      { text: 'Con calma. Busco lo natural en todo', sub: 'Ritmo lento, decisiones conscientes', value: 'tranquilo' }
    ]
  },
  {
    id: 'cosmetica',
    number: 'Tu decisión — Lo que buscas',
    text: '¿Qué buscas realmente cuando cuidas tu piel?',
    options: [
      { text: 'Activarla desde dentro. Sin forzarla', sub: 'Sin agujas, sin intervenciones, sin artificios', value: 'natural' },
      { text: 'Una alternativa real a lo que no me convenció', sub: 'Resultados sin depender de procedimientos', value: 'alternativa' },
      { text: 'Resultados visibles. El método me importa menos', sub: 'Lo que funcione, que funcione', value: 'resultados' },
      { text: 'Empezar. Este sería mi primer paso consciente', sub: 'Nunca he hecho algo así y quiero comenzar bien', value: 'primero' }
    ]
  },
  {
    id: 'objetivo',
    number: 'Tu piel habla — Escúchala',
    text: 'Si tu piel pudiera hablarte, ¿qué te diría?',
    options: [
      { text: '"Actívame. Tengo más luz de la que muestro"', sub: 'Glow real, sin maquillaje, sin filtros', value: 'luminosa' },
      { text: '"Recuérdame cómo era cuando estaba despierta"', sub: 'Firmeza, energía, presencia recuperada', value: 'energia' },
      { text: '"Dame estructura. Quiero volver a sujetarme"', sub: 'Contorno definido, sin perder expresión', value: 'estructura' },
      { text: '"Cuídame como merece algo vivo"', sub: 'Un ritual que conecte cuerpo, piel y alma', value: 'ritual' }
    ]
  }
];

let current = 0;
let answers = {};
let selectedOption = null;
let currentLinea = null;

function renderQuestion() {
  const q = questions[current];
  const pct = (current / questions.length) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Pregunta ${current + 1} de ${questions.length}`;
  document.getElementById('qNumber').textContent = q.number;
  document.getElementById('qText').textContent = q.text;

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  selectedOption = null;
  document.getElementById('btnNext').classList.remove('visible');

  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `
      <div class="opt-marker"></div>
      <div>
        <div class="opt-text">${opt.text}</div>
        ${opt.sub ? `<div class="opt-sub">${opt.sub}</div>` : ''}
      </div>`;
    btn.onclick = () => selectOption(i, opt.value, q.id);
    container.appendChild(btn);
  });

  // Animación de entrada
  const card = document.getElementById('questionCard');
  card.style.opacity = '0';
  card.style.transform = 'translateY(12px)';
  setTimeout(() => {
    card.style.transition = 'all 0.4s ease';
    card.style.opacity = '1';
    card.style.transform = 'translateY(0)';
  }, 50);
}

function selectOption(index, value, questionId) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.option')[index].classList.add('selected');
  selectedOption = value;
  answers[questionId] = value;
  document.getElementById('btnNext').classList.add('visible');
}

function nextQuestion() {
  if (!selectedOption) return;
  current++;
  if (current < questions.length) {
    renderQuestion();
  } else {
    showAnalyzing();
  }
}

function showAnalyzing() {
  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
  const analyzing = document.getElementById('analyzingSection');
  analyzing.classList.add('active');
  analyzing.style.opacity = '0';
  setTimeout(() => {
    analyzing.style.transition = 'opacity 0.6s ease';
    analyzing.style.opacity = '1';
  }, 50);
  getRecommendation();
}

function determineLineLocally(answers) {
  // Lógica local como fallback
  let score = { PREVENT: 0, RECOVER: 0, RECLAIM: 0 };

  if (answers.edad === '20-30') score.PREVENT += 3;
  if (answers.edad === '30-45') score.RECOVER += 3;
  if (answers.edad === '45+') score.RECLAIM += 3;

  if (answers.preocupacion === 'luminosidad' || answers.preocupacion === 'prevencion') score.PREVENT += 2;
  if (answers.preocupacion === 'firmeza') score.RECOVER += 2;
  if (answers.preocupacion === 'flacidez') score.RECLAIM += 2;

  if (answers.objetivo === 'luminosa' || answers.objetivo === 'ritual') score.PREVENT += 1;
  if (answers.objetivo === 'energia') score.RECOVER += 1;
  if (answers.objetivo === 'estructura') score.RECLAIM += 1;

  return Object.entries(score).sort((a,b) => b[1]-a[1])[0][0];
}

async function getRecommendation() {
  const linea = determineLineLocally(answers);

  const prompt = `Eres la voz de YADALA — cosmética ancestral española, 4 generaciones, fundada por Pedro Jordà en Lanzarote. Mascarilla facial de bioestimulación natural. 55 minutos. Sin agujas. Sin cirugía. Sin parálisis.

VOZ YADALA — REGLAS ABSOLUTAS:
- Empieza siempre por lo que la persona ya siente, no por el producto
- Frases cortas. Ritmo visual. Saltos de línea entre ideas.
- Nunca corrijas, acompaña
- Conecta piel con vida real siempre
- Sensorialidad obligatoria: usa "cara despierta", "piel que respira", "rostro con vida", "firme al tacto"
- PROHIBIDO: milagroso, antiedad agresivo, energía cuántica, vibración, urgencia artificial
- PALABRAS QUE USAS: activar, responder, ritmo, piel viva, cara despierta, estructura, presencia

MODELO CIRCA — APLICA EN ESTE ORDEN:
1. CO-REGULACIÓN (frase_apertura): valida cómo se siente ANTES de cualquier recomendación
2. IDENTIDAD (diagnostico): conecta con quién es ella, no solo con su problema
3. RITUAL (por_que_tu_linea + protocolo): introduce Yadala como invitación, no como solución
4. CONFIRMACIÓN (beneficios): nombra lo que va a notar, concreto y sensorial
5. AUTONOMÍA (mensaje_final): termina con algo que ella ya sabe, que le pertenece

INGREDIENTES — NOMBRES FUNCIONALES OBLIGATORIOS:
- Emocional: "Complejo botánico antioxidante", "Sal mineral ancestral", "Mineral equilibrante natural"
- Técnico suave: "Extractos ricos en polifenoles", "Cristal mineral natural"
- Sinergia: "Fórmula bioactiva de triple origen natural"

LAS 3 LÍNEAS:
